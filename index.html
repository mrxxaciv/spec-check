<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Specs Checker | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a;
            --card: #161925;
            --accent: #00f2ff;
            --accent2: #7000ff;
            --text: #e0e0e0;
            --muted: #8b949e;
            --border: #30363d;
            --green: #23d18b;
            --yellow: #f5a623;
            --red: #ff453a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 50px; }
        header h1 { 
            font-size: 3rem; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .spec-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; color: var(--accent); text-transform: uppercase; font-size: 0.85rem; }
        
        select, input {
            background: #090b11;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input:focus { border-color: var(--accent); }

        button.main-btn {
            grid-column: 1 / -1;
            background: linear-gradient(45deg, var(--accent2), var(--accent));
            border: none;
            color: white;
            padding: 15px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .summary-bar {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }
        .stat-val { font-size: 2rem; font-weight: 700; display: block; }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .filter-btn.active { background: var(--accent2); color: white; border-color: var(--accent2); }

        .search-box { flex: 1; min-width: 200px; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #1c212e; color: var(--accent); text-align: left; padding: 15px; text-transform: uppercase; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        
        .status-badge { padding: 4px 10px; border-radius: 4px; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
        .recommended { background: rgba(35, 209, 139, 0.2); color: var(--green); }
        .minimum { background: rgba(245, 166, 35, 0.2); color: var(--yellow); }
        .incompatible { background: rgba(255, 69, 58, 0.2); color: var(--red); }

        .genre-tag { color: var(--muted); font-size: 0.8rem; }
        .check-cell { text-align: center; }

        /* Loading Spinner */
        #loader { display: none; text-align: center; padding: 40px; color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SpecCheck Pro</h1>
        <p style="color: var(--muted)">Enter your rig to see what you can play</p>
    </header>

    <div class="spec-panel">
        <div class="input-group">
            <label>Graphics Card</label>
            <select id="gpu-select"><option>Loading...</option></select>
        </div>
        <div class="input-group">
            <label>Processor</label>
            <select id="cpu-select"><option>Loading...</option></select>
        </div>
        <div class="input-group">
            <label>RAM (GB)</label>
            <input type="number" id="ram-input" value="16">
        </div>
        <div class="input-group">
            <label>Free Space (GB)</label>
            <input type="number" id="storage-input" value="500">
        </div>
        <button class="main-btn" onclick="checkSpecs()">Run Compatibility Check</button>
    </div>

    <div id="loader">ANALYZING SYSTEM REQUIREMENTS...</div>

    <div id="summary" class="summary-bar">
        <div class="stat-card"><span class="stat-val" id="count-rec" style="color: var(--green)">0</span> RECOMMENDED</div>
        <div class="stat-card"><span class="stat-val" id="count-min" style="color: var(--yellow)">0</span> MINIMUM</div>
        <div class="stat-card"><span class="stat-val" id="count-inc" style="color: var(--red)">0</span> CAN'T RUN</div>
    </div>

    <div id="filter-row" style="display:none; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
        <input class="search-box" id="search-box" type="text" placeholder="Search game…" oninput="applyFilter()">
        <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-f="recommended" onclick="setFilter('recommended',this)">Recommended</button>
        <button class="filter-btn" data-f="minimum" onclick="setFilter('minimum',this)">Minimum</button>
        <button class="filter-btn" data-f="incompatible" onclick="setFilter('incompatible',this)">Can't Run</button>
        
        <select id="genre-select" class="search-box" style="flex:0 0 160px;" onchange="applyFilter()">
            <option value="">All Genres</option>
            <option value="Action">Action</option>
            <option value="Battle Royale">Battle Royale</option>
            <option value="Co-op">Co-op</option>
            <option value="Exploration">Exploration</option>
            <option value="FPS">FPS</option>
            <option value="Horror">Horror</option>
            <option value="MMO">MMO</option>
            <option value="MOBA">MOBA</option>
            <option value="Open World">Open World</option>
            <option value="Puzzle">Puzzle</option>
            <option value="Racing">Racing</option>
            <option value="RPG">RPG</option>
            <option value="Sandbox">Sandbox</option>
            <option value="Simulation">Simulation</option>
            <option value="Social">Social</option>
            <option value="Sports">Sports</option>
            <option value="Strategy">Strategy</option>
            <option value="Survival">Survival</option>
            <option value="VR">VR</option>
        </select>
    </div>

    <table id="results-table" style="display:none">
        <thead>
            <tr>
                <th>Game</th>
                <th>Genre</th>
                <th>Status</th>
                <th>GPU</th>
                <th>CPU</th>
                <th>RAM</th>
                <th>Storage</th>
                <th>Upgrade Advisor</th>
            </tr>
        </thead>
        <tbody id="results-body"></tbody>
    </table>
</div>

<script>
    const API_BASE = "https://spec-check-5rbu.onrender.com";
    let allResults = [];
    let activeFilter = "all";

    async function loadHardware() {
        try {
            const [gpus, cpus] = await Promise.all([
                fetch(`${API_BASE}/api/gpus`).then(r => r.json()),
                fetch(`${API_BASE}/api/cpus`).then(r => r.json())
            ]);

            const gpuSel = document.getElementById("gpu-select");
            gpuSel.innerHTML = gpus.map(g => `<option value="${g.gpu_name}">${g.gpu_name} (Tier ${g.tier})</option>`).join("");
            
            const cpuSel = document.getElementById("cpu-select");
            cpuSel.innerHTML = cpus.map(c => `<option value="${c.cpu_name}">${c.cpu_name} (Tier ${c.tier})</option>`).join("");
            
            restoreRig();
        } catch (e) { console.error("Load failed", e); }
    }

    async function checkSpecs() {
        const gpu = document.getElementById("gpu-select").value;
        const cpu = document.getElementById("cpu-select").value;
        const ram = document.getElementById("ram-input").value;
        const storage = document.getElementById("storage-input").value;

        saveRig();
        document.getElementById("loader").style.display = "block";
        
        try {
            const res = await fetch(`${API_BASE}/api/check?gpu=${gpu}&cpu=${cpu}&ram=${ram}&storage=${storage}`);
            const data = await res.json();
            
            allResults = data.results;
            document.getElementById("count-rec").innerText = data.summary.recommended;
            document.getElementById("count-min").innerText = data.summary.minimum;
            document.getElementById("count-inc").innerText = data.summary.incompatible;

            document.getElementById("summary").style.display = "grid";
            document.getElementById("filter-row").style.display = "flex";
            document.getElementById("results-table").style.display = "table";
            
            applyFilter();
        } catch (e) { alert("Check failed. Verify backend is live."); }
        finally { document.getElementById("loader").style.display = "none"; }
    }

    function renderTable(rows) {
        const tbody = document.getElementById("results-body");
        tbody.innerHTML = "";

        if (!rows.length) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:40px;">No games match filter.</td></tr>`;
            return;
        }

        rows.forEach(r => {
            let advisorCell = "—";
            if (r.status === "incompatible" && r.suggestions && r.suggestions.length) {
                const bullets = r.suggestions.map(s => `
                    <li style="margin-bottom:8px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                        <span style="color:var(--muted); font-size:.78rem;">${s.message}</span>
                        <a href="${s.link}" target="_blank" rel="noopener noreferrer" 
                           style="display:inline-block; padding:3px 10px; background:var(--accent2); color:#fff; border-radius:3px; font-size:.72rem; text-decoration:none; font-weight:600;">
                           🛒 Buy on Amazon
                        </a>
                    </li>`).join("");

                advisorCell = `<details><summary style="cursor:pointer; color:var(--red); font-size:.8rem;">▲ ${r.suggestions.length} upgrade(s) needed</summary>
                                <ul style="margin-top:10px; padding-left:12px; border-left:2px solid var(--border); list-style:none;">${bullets}</ul></details>`;
            } else if (r.status === "recommended") {
                advisorCell = `<span style="color:var(--green); font-size:.8rem;">✦ All good</span>`;
            } else if (r.status === "minimum") {
                advisorCell = `<span style="color:var(--yellow); font-size:.8rem;">▲ Upgrade for best experience</span>`;
            }

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="game-title">${r.title}</td>
                <td><span class="genre-tag">${r.genre}</span></td>
                <td><span class="status-badge ${r.status}">${statusLabel(r.status)}</span></td>
                <td class="check-cell">${r.gpu_ok}</td>
                <td class="check-cell">${r.cpu_ok}</td>
                <td class="check-cell">${r.ram_ok}</td>
                <td class="check-cell">${r.storage_ok}</td>
                <td style="min-width:200px;">${advisorCell}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function statusLabel(s) {
        if (s === "recommended") return "✦ Recommended";
        if (s === "minimum") return "▲ Minimum";
        return "✕ Can't Run";
    }

    function setFilter(type, btn) {
        activeFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter();
    }

    function applyFilter() {
        const q = (document.getElementById("search-box").value || "").toLowerCase();
        const genre = document.getElementById("genre-select").value;
        const filtered = allResults.filter(r => {
            const matchStatus = activeFilter === "all" || r.status === activeFilter;
            const matchSearch = r.title.toLowerCase().includes(q);
            const matchGenre = !genre || r.genre === genre;
            return matchStatus && matchSearch && matchGenre;
        });
        renderTable(filtered);
    }

    function saveRig() {
        localStorage.setItem("rig_gpu", document.getElementById("gpu-select").value);
        localStorage.setItem("rig_cpu", document.getElementById("cpu-select").value);
        localStorage.setItem("rig_ram", document.getElementById("ram-input").value);
        localStorage.setItem("rig_storage", document.getElementById("storage-input").value);
    }

    function restoreRig() {
        const gpu = localStorage.getItem("rig_gpu");
        const cpu = localStorage.getItem("rig_cpu");
        const ram = localStorage.getItem("rig_ram");
        const storage = localStorage.getItem("rig_storage");
        if(gpu) document.getElementById("gpu-select").value = gpu;
        if(cpu) document.getElementById("cpu-select").value = cpu;
        if(ram) document.getElementById("ram-input").value = ram;
        if(storage) document.getElementById("storage-input").value = storage;
    }

    loadHardware();
</script>
</body>
</html>
